services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beats_app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: beats_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: beats_db
    environment:
      MYSQL_DATABASE: beats
      MYSQL_USER: beats
      MYSQL_PASSWORD: beats
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - beats_db:/var/lib/mysql

  mailhog:
    image: mailhog/mailhog
    container_name: beats_mailhog
    ports:
      - "8025:8025"

volumes:
  beats_db:
